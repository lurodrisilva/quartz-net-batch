apiVersion: v1
kind: ServiceAccount
metadata:
  name: batch-scheduler-sa
  namespace: batch-scheduler
  annotations:
    azure.workload.identity/client-id: "<your-managed-identity-client-id>"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: batch-scheduler
  namespace: batch-scheduler
  labels:
    app: batch-scheduler
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: batch-scheduler
  template:
    metadata:
      labels:
        app: batch-scheduler
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: batch-scheduler-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      terminationGracePeriodSeconds: 60
      containers:
        - name: worker
          image: ghcr.io/lurodrisilva/quartz-net-batch:1.0.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: batch-scheduler-config
            - secretRef:
                name: batch-scheduler-secrets
          env:
            - name: DOTNET_gcServer
              value: "1"
          startupProbe:
            httpGet:
              path: /health/startup
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: batch-scheduler
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: batch-scheduler-pdb
  namespace: batch-scheduler
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: batch-scheduler
